name = "mandoubak-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NODE_ENV = "production"
APP_NAME = "mandoubak"

# Cloudflare KV Namespace
[[kv_namespaces]]
binding = "MANDOUBAK_KV"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_KV_PREVIEW_ID"

# Cloudflare R2 Bucket
[[r2_buckets]]
binding = "MANDOUBAK_R2"
bucket_name = "mandoubak-ids"
preview_bucket_name = "mandoubak-ids-preview"

# Routes
[[routes]]
pattern = "api.mandoubak.com/*"
zone_name = "mandoubak.com"

[dev]
port = 8787
local_protocol = "http"

# Secrets - تضاف بـ: wrangler secret put SECRET_NAME
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# CLERK_SECRET_KEY
# CLERK_WEBHOOK_SECRET
# JWT_SECRET
